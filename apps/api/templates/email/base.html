<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        /*
          Email styles are inlined-friendly: no custom fonts (Numans/Syncopate
          are unsafe in email clients), no flexbox, no grid. KPI brand colors
          mirror the website source-of-truth:
            blue  = #211c60  (headings, borders)
            purple = #a694ff  (buttons, accents)
        */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                         'Helvetica Neue', Arial, sans-serif;
            line-height: 1.55;
            color: #211c60;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .card {
            background: #ffffff;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(33, 28, 96, 0.08);
        }
        .logo {
            margin-bottom: 24px;
        }
        .logo img {
            display: block;
            height: 36px;
            width: auto;
        }
        h1, h2 {
            color: #211c60;
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 16px 0;
            line-height: 1.3;
        }
        p {
            margin: 0 0 16px 0;
            color: #4a4a6e;
            font-size: 15px;
        }
        .button {
            display: inline-block;
            padding: 13px 28px;
            background-color: #a694ff;
            color: #211c60 !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            margin: 12px 0;
        }
        .button:hover {
            background-color: #bdb0ff;
        }
        .code {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #211c60;
            text-align: center;
            padding: 24px;
            background: #f5f3ff;
            border-radius: 8px;
            margin: 16px 0;
        }
        .quote {
            border-left: 3px solid #a694ff;
            padding-left: 16px;
            margin: 16px 0;
            color: #4a4a6e;
            font-style: italic;
        }
        .signoff {
            margin-top: 24px;
            color: #211c60;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e8e5f5;
            color: #8a87a8;
            font-size: 13px;
        }
        .muted {
            color: #8a87a8;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <a href="{{ frontend_url|default('https://frame.kpicreatives.com', true) }}" style="display: inline-block;">
                    <img src="{{ logo_url|default('https://frame.kpicreatives.com/kpi-logo.png', true) }}" alt="KPI Creatives" width="58" height="36">
                </a>
            </div>
            {% block content %}{% endblock %}
        </div>
        <div class="footer">
            <p>© {{ year|default('2026', true) }} KPI Creatives. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
